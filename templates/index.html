<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Cowork</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f1117;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: #161822;
            border-bottom: 1px solid #2a2d3a;
            gap: 12px;
        }
        header h1 { font-size: 18px; color: #7c8aff; white-space: nowrap; }
        .header-right { display: flex; align-items: center; gap: 10px; }
        #status {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 12px;
            background: #1e2130;
        }
        #status.ok { color: #4caf50; }
        #status.err { color: #f44336; }
        .hdr-btn {
            background: #1e2130;
            border: 1px solid #2a2d3a;
            color: #aaa;
            border-radius: 6px;
            padding: 5px 12px;
            cursor: pointer;
            font-size: 12px;
        }
        .hdr-btn:hover { background: #2a2d3a; color: #fff; }
        .hdr-btn.active { background: #7c8aff33; border-color: #7c8aff; color: #7c8aff; }
        #pause-btn.paused { background: #f4433633; border-color: #f44336; color: #f44336; }

        /* Main layout */
        .main { flex: 1; display: flex; overflow: hidden; }

        /* Screen panel */
        .screen-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 12px;
            min-width: 0;
        }
        .screen-panel h2 {
            font-size: 13px; color: #888; margin-bottom: 8px;
            text-transform: uppercase; letter-spacing: 1px;
        }
        #screen-img {
            flex: 1; background: #000; border-radius: 8px;
            object-fit: contain; width: 100%; min-height: 0;
        }

        /* Chat panel */
        .chat-panel {
            width: 380px; display: flex; flex-direction: column;
            border-left: 1px solid #2a2d3a; background: #161822;
        }
        .chat-panel h2 {
            font-size: 13px; color: #888; padding: 12px 16px 8px;
            text-transform: uppercase; letter-spacing: 1px;
        }
        #messages {
            flex: 1; overflow-y: auto; padding: 8px 16px;
            display: flex; flex-direction: column; gap: 8px;
        }
        .msg {
            padding: 8px 12px; border-radius: 10px; max-width: 90%;
            font-size: 14px; line-height: 1.5; word-wrap: break-word;
            white-space: pre-wrap;
        }
        .msg.user { background: #2d3a6d; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.bot { background: #1e2130; align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg.bot.loading { color: #666; font-style: italic; }

        /* Input bar */
        .input-bar {
            display: flex; padding: 12px; gap: 8px;
            border-top: 1px solid #2a2d3a;
        }
        #chat-input {
            flex: 1; background: #1e2130; border: 1px solid #2a2d3a;
            border-radius: 8px; padding: 10px 14px; color: #e0e0e0;
            font-size: 14px; outline: none;
        }
        #chat-input:focus { border-color: #7c8aff; }
        #send-btn {
            background: #7c8aff; border: none; border-radius: 8px;
            padding: 10px 18px; color: #fff; font-weight: 600; cursor: pointer;
        }
        #send-btn:hover { background: #6b7ae0; }
        #send-btn:disabled { opacity: 0.4; cursor: default; }

        /* Settings panel (overlay) */
        .settings-overlay {
            display: none; position: fixed; inset: 0; z-index: 100;
            background: rgba(0,0,0,0.6); justify-content: center; align-items: center;
        }
        .settings-overlay.show { display: flex; }
        .settings-box {
            background: #161822; border: 1px solid #2a2d3a; border-radius: 12px;
            padding: 24px; width: 460px; max-height: 80vh; overflow-y: auto;
        }
        .settings-box h2 { font-size: 16px; color: #7c8aff; margin-bottom: 16px; }
        .settings-box label {
            display: block; font-size: 12px; color: #888; margin: 12px 0 4px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .settings-box input, .settings-box select {
            width: 100%; background: #1e2130; border: 1px solid #2a2d3a;
            border-radius: 6px; padding: 8px 12px; color: #e0e0e0;
            font-size: 14px; outline: none;
        }
        .settings-box input:focus, .settings-box select:focus { border-color: #7c8aff; }
        .settings-box .row { display: flex; gap: 12px; }
        .settings-box .row > div { flex: 1; }
        .settings-actions {
            display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end;
        }
        .settings-actions button {
            padding: 8px 20px; border-radius: 6px; border: none;
            cursor: pointer; font-size: 14px;
        }
        .btn-save { background: #7c8aff; color: #fff; font-weight: 600; }
        .btn-save:hover { background: #6b7ae0; }
        .btn-cancel { background: #2a2d3a; color: #aaa; }
        .btn-cancel:hover { background: #333; }
        .hint { font-size: 11px; color: #555; margin-top: 2px; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    </style>
</head>
<body>
    <header>
        <h1>AI Cowork</h1>
        <div class="header-right">
            <span id="status">connecting...</span>
            <button id="pause-btn" class="hdr-btn" onclick="togglePause()">Pause</button>
            <button class="hdr-btn" onclick="openSettings()">Settings</button>
        </div>
    </header>

    <div class="main">
        <div class="screen-panel">
            <h2>Live Screen</h2>
            <img id="screen-img" alt="Screen capture" />
        </div>
        <div class="chat-panel">
            <h2>Chat</h2>
            <div id="messages">
                <div class="msg bot">Hi! I can see your screen. Ask me anything about what you're working on.</div>
            </div>
            <div class="input-bar">
                <input id="chat-input" type="text" placeholder="Ask about your screen..." autocomplete="off" />
                <button id="send-btn">Send</button>
            </div>
        </div>
    </div>

    <!-- Settings modal -->
    <div class="settings-overlay" id="settings-overlay">
        <div class="settings-box">
            <h2>Settings</h2>
            <label>LLM Provider</label>
            <select id="s-provider">
                <option value="ollama">Ollama (local)</option>
                <option value="openai">OpenAI</option>
                <option value="anthropic">Anthropic Claude</option>
            </select>

            <div id="ollama-opts">
                <div class="row">
                    <div>
                        <label>Ollama URL</label>
                        <input id="s-ollama-url" type="text" placeholder="http://localhost:11434" />
                    </div>
                    <div>
                        <label>Model</label>
                        <input id="s-ollama-model" type="text" placeholder="qwen2.5:7b" />
                    </div>
                </div>
            </div>

            <div id="openai-opts" style="display:none">
                <div class="row">
                    <div>
                        <label>API Key</label>
                        <input id="s-openai-key" type="password" placeholder="sk-..." />
                        <div class="hint" id="s-openai-hint"></div>
                    </div>
                    <div>
                        <label>Model</label>
                        <input id="s-openai-model" type="text" placeholder="gpt-4o-mini" />
                    </div>
                </div>
            </div>

            <div id="anthropic-opts" style="display:none">
                <div class="row">
                    <div>
                        <label>API Key</label>
                        <input id="s-anthropic-key" type="password" placeholder="sk-ant-..." />
                        <div class="hint" id="s-anthropic-hint"></div>
                    </div>
                    <div>
                        <label>Model</label>
                        <input id="s-anthropic-model" type="text" placeholder="claude-sonnet-4-20250514" />
                    </div>
                </div>
            </div>

            <label>Capture Interval (seconds)</label>
            <input id="s-interval" type="number" min="1" max="60" value="5" />

            <label>Privacy Filter (exclude windows containing)</label>
            <input id="s-privacy" type="text" placeholder="e.g. banking, password, 1password" />
            <div class="hint">Comma-separated keywords. Windows with matching titles won't be captured.</div>

            <div class="settings-actions">
                <button class="btn-cancel" onclick="closeSettings()">Cancel</button>
                <button class="btn-save" onclick="saveSettings()">Save</button>
            </div>
        </div>
    </div>

    <script>
        const img = document.getElementById('screen-img');
        const input = document.getElementById('chat-input');
        const btn = document.getElementById('send-btn');
        const messages = document.getElementById('messages');
        const statusEl = document.getElementById('status');
        const pauseBtn = document.getElementById('pause-btn');

        // Refresh screen every 3s
        function refreshScreen() {
            const n = new Image();
            n.onload = () => { img.src = n.src; };
            n.src = '/api/screen?t=' + Date.now();
        }
        setInterval(refreshScreen, 3000);
        refreshScreen();

        // Status poll
        async function checkStatus() {
            try {
                const r = await fetch('/api/status');
                const d = await r.json();
                const prov = d.provider === 'ollama' ? d.llm : d.provider;
                statusEl.textContent = `${prov} · ${d.observations} obs · ${d.model}`;
                statusEl.className = d.llm === 'connected' ? 'ok' : 'err';
                if (d.paused) {
                    pauseBtn.textContent = 'Resume';
                    pauseBtn.classList.add('paused');
                } else {
                    pauseBtn.textContent = 'Pause';
                    pauseBtn.classList.remove('paused');
                }
            } catch {
                statusEl.textContent = 'offline';
                statusEl.className = 'err';
            }
        }
        setInterval(checkStatus, 8000);
        checkStatus();

        // Pause toggle
        async function togglePause() {
            await fetch('/api/pause', { method: 'POST' });
            checkStatus();
        }

        // Chat
        function addMsg(text, cls) {
            const div = document.createElement('div');
            div.className = 'msg ' + cls;
            div.textContent = text;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
            return div;
        }

        async function sendChat() {
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            addMsg(text, 'user');
            btn.disabled = true;
            const loading = addMsg('Thinking...', 'bot loading');
            try {
                const r = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text }),
                });
                const d = await r.json();
                loading.textContent = d.reply || d.error || 'No response';
                loading.classList.remove('loading');
            } catch {
                loading.textContent = 'Failed to reach server.';
                loading.classList.remove('loading');
            }
            btn.disabled = false;
            input.focus();
        }

        btn.addEventListener('click', sendChat);
        input.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
        });

        // Settings
        const providerSelect = document.getElementById('s-provider');
        providerSelect.addEventListener('change', () => {
            document.getElementById('ollama-opts').style.display = providerSelect.value === 'ollama' ? '' : 'none';
            document.getElementById('openai-opts').style.display = providerSelect.value === 'openai' ? '' : 'none';
            document.getElementById('anthropic-opts').style.display = providerSelect.value === 'anthropic' ? '' : 'none';
        });

        async function openSettings() {
            const r = await fetch('/api/settings');
            const s = await r.json();
            providerSelect.value = s.llm_provider;
            providerSelect.dispatchEvent(new Event('change'));
            document.getElementById('s-ollama-url').value = s.ollama_url;
            document.getElementById('s-ollama-model').value = s.ollama_model;
            document.getElementById('s-openai-model').value = s.openai_model;
            document.getElementById('s-anthropic-model').value = s.anthropic_model;
            document.getElementById('s-openai-hint').textContent = s.openai_key_set ? 'Key is set' : '';
            document.getElementById('s-anthropic-hint').textContent = s.anthropic_key_set ? 'Key is set' : '';
            document.getElementById('s-interval').value = s.capture_interval;
            document.getElementById('s-privacy').value = (s.privacy_exclude || []).join(', ');
            document.getElementById('settings-overlay').classList.add('show');
        }

        function closeSettings() {
            document.getElementById('settings-overlay').classList.remove('show');
        }

        async function saveSettings() {
            const body = {
                llm_provider: providerSelect.value,
                ollama_url: document.getElementById('s-ollama-url').value,
                ollama_model: document.getElementById('s-ollama-model').value,
                openai_model: document.getElementById('s-openai-model').value,
                anthropic_model: document.getElementById('s-anthropic-model').value,
                capture_interval: parseInt(document.getElementById('s-interval').value) || 5,
                privacy_exclude: document.getElementById('s-privacy').value.split(',').map(s => s.trim()).filter(Boolean),
            };
            const openaiKey = document.getElementById('s-openai-key').value;
            if (openaiKey) body.openai_key = openaiKey;
            const anthropicKey = document.getElementById('s-anthropic-key').value;
            if (anthropicKey) body.anthropic_key = anthropicKey;

            await fetch('/api/settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            });
            closeSettings();
            checkStatus();
        }

        document.getElementById('settings-overlay').addEventListener('click', e => {
            if (e.target === e.currentTarget) closeSettings();
        });
    </script>
</body>
</html>
